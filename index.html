<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>幸运大转盘 - 赢取奖励（李雨珊是我女儿）</title>
    <style>
        body { font-family: 'PingFang SC', sans-serif; background: #f7f7f7; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { text-align: center; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 90%; max-width: 400px; }
        h2 { color: #e91e63; margin-bottom: 20px; }

        /* 转盘样式 */
        .wheel-wrapper { position: relative; width: 300px; height: 300px; margin: 0 auto 20px; }
        #wheel-canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 8px solid #333;
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
        }
        /* 指针 */
        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 35px solid #333;
            z-index: 10;
        }

        /* 抽奖按钮 */
        #spin-btn { background: #ff5722; color: white; border: none; padding: 12px 40px; font-size: 18px; border-radius: 30px; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(255,87,34,0.3); }
        #spin-btn:disabled { background: #ccc; cursor: not-allowed; box-shadow: none; }

        /* 结果弹窗 */
        #result-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 15px; box-shadow: 0 0 50px rgba(0,0,0,0.5); z-index: 100; width: 80%; text-align: center; }
        .reward-code { font-size: 24px; color: #ff5722; font-weight: bold; margin: 15px 0; padding: 10px; border: 2px dashed #ff5722; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 90; }
    </style>
</head>
<body>

<div class="container">
    <h2>✨ 试试你的手气 ✨</h2>
    <p>赢了拿 6 元，输了也有 1 元哦！</p>

    <div class="wheel-wrapper">
        <div class="pointer"></div>
        <canvas id="wheel-canvas" width="300" height="300"></canvas>
    </div>

    <button id="spin-btn">开始抽奖</button>
</div>

<div class="overlay" id="overlay"></div>
<div id="result-modal">
    <h3 id="result-title">恭喜你！</h3>
    <p id="result-msg"></p>
    <div class="reward-code" id="reward-code">获取中...</div>
    <p style="font-size: 12px; color: #666;">复制上方口令，打开【支付宝】领取</p>
    <button onclick="closeModal()" style="margin-top: 15px; padding: 8px 20px; border: none; background: #007bff; color: white; border-radius: 5px; cursor: pointer;">确定</button>
</div>

<script>
    const canvas = document.getElementById('wheel-canvas');
    const ctx = canvas.getContext('2d');
    const spinBtn = document.getElementById('spin-btn');
    const modal = document.getElementById('result-modal');
    const overlay = document.getElementById('overlay');

    // --- 修改此处口令 ---
    const WIN_CODE = "29012440";
    const LOSS_CODE = "36594790";
    // ------------------

    const sectors = [
        { color: "#FFEB3B", label: "6元" }, // 索引 0
        { color: "#f44336", label: "1元" }  // 索引 1
    ];

    let currentRotation = 0; // 记录累计旋转角度

    // 绘制转盘
    function drawWheel() {
        const centerX = 150;
        const centerY = 150;
        const radius = 150;

        sectors.forEach((s, i) => {
            const angle = Math.PI; // 每个扇区 180 度
            const startAngle = i * angle;

            ctx.beginPath();
            ctx.fillStyle = s.color;
            ctx.moveTo(centerX, centerY);
            ctx.arc(centerX, centerY, radius, startAngle, startAngle + angle);
            ctx.fill();

            // 绘制文字
            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.rotate(startAngle + angle / 2);
            ctx.fillStyle = "#333";
            ctx.font = "bold 24px Arial";
            ctx.textAlign = "right";
            ctx.fillText(s.label, radius - 20, 10);
            ctx.restore();
        });
    }

    drawWheel();

    spinBtn.addEventListener('click', () => {
        spinBtn.disabled = true;

        // 1. 决定结果 (20% 概率中 6 元)
        const isWin = Math.random() < 0.2;
        const resultIndex = isWin ? 0 : 1;

        // 2. 计算角度
        // 这里的逻辑：由于指针在顶部(270度方向)，我们需要根据扇区位置计算偏移
        // 基础旋转 5 圈 (1800度) + 目标扇区偏移
        const baseRounds = 1800;

        // 扇区0 (6元) 在 0-180度，扇区1 (1元) 在 180-360度
        // 为了让指针指准，我们需要反向旋转或者计算相对位置
        let targetAngle = 0;
        if (resultIndex === 0) {
            targetAngle = 90 + Math.random() * 160; // 停在 6元 区域
        } else {
            targetAngle = 270 + Math.random() * 160; // 停在 1元 区域
        }

        currentRotation += baseRounds + (360 - (currentRotation % 360)) + targetAngle;

        // 3. 执行动画
        canvas.style.transform = `rotate(${currentRotation}deg)`;

        // 4. 展示结果
        setTimeout(() => {
            showResult(resultIndex);
        }, 4000);
    });

    function showResult(index) {
        overlay.style.display = 'block';
        modal.style.display = 'block';
        if (index === 0) {
            document.getElementById('result-title').innerText = "手气爆棚！🎉";
            document.getElementById('result-msg').innerText = "获得 6 元奖励金：";
            document.getElementById('reward-code').innerText = WIN_CODE;
        } else {
            document.getElementById('result-title').innerText = "差一点点！";
            document.getElementById('result-msg').innerText = "送你 1 元安慰奖：";
            document.getElementById('reward-code').innerText = LOSS_CODE;
        }
    }

    function closeModal() {
        overlay.style.display = 'none';
        modal.style.display = 'none';
        spinBtn.disabled = false; // 允许再次抽奖
    }
</script>
</body>

</html>
